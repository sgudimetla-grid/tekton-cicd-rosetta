apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  labels:
    app.kubernetes.io/part-of: nextjs-pipeline
spec:
  description: Clone a Git repository into the workspace.
  params:
    - name: repo-url
      type: string
      description: The URL of the Git repository to clone.
    - name: revision
      type: string
      default: main
      description: The branch, tag, or commit SHA to checkout.
  workspaces:
    - name: source
      description: The workspace to clone the source code into.
  steps:
    - name: clone
      image: alpine/git:2.43.0
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        set -eu
        git clone --depth 1 --branch "$(params.revision)" "$(params.repo-url)" .
        echo "Cloned $(params.repo-url) at $(params.revision)"
        git log --oneline -1
